name: Publish Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 2"  # Rebuild weekly on Tuesdays to pick up base image and dependency updates
  push:
    branches:
      - main

permissions:
  contents: read

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}

concurrency:
  group: publish-release
  cancel-in-progress: true

jobs:
  smoke-test:
    uses: ./.github/workflows/smoke_test.yml

  build:
    name: Build and Push Docker Image
    needs: smoke-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set platform variables
        id: platform
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "docker_platform=linux/arm64" >> "$GITHUB_OUTPUT"
            echo "base_image=ghcr.io/linuxserver/baseimage-selkies:arm64v8-ubuntunoble" >> "$GITHUB_OUTPUT"
          else
            echo "docker_platform=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "base_image=ghcr.io/linuxserver/baseimage-selkies:ubuntunoble" >> "$GITHUB_OUTPUT"
          fi

      - name: Read Current Release Version
        id: get_version
        run: echo "VERSION=$(cat .github/.current-release)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ steps.platform.outputs.docker_platform }}
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.platform.outputs.base_image }}
            VERSION=${{ steps.get_version.outputs.VERSION }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          outputs: type=image,name=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Current Release Version
        id: get_version
        run: echo "VERSION=$(cat .github/.current-release)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
            ${{ env.DOCKERHUB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.get_version.outputs.VERSION }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Resolve digests
        id: digests
        run: |
          AMD64_DIGEST="sha256:$(ls /tmp/digests/digest-amd64/)"
          ARM64_DIGEST="sha256:$(ls /tmp/digests/digest-arm64/)"
          echo "amd64=$AMD64_DIGEST" >> "$GITHUB_OUTPUT"
          echo "arm64=$ARM64_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Tag per-platform images (GHCR)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          docker buildx imagetools create --prefer-index=false \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:amd64-${VERSION} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:amd64-latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.amd64 }}
          docker buildx imagetools create --prefer-index=false \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:arm64-${VERSION} \
            -t ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:arm64-latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.arm64 }}

      - name: Tag per-platform images (Docker Hub)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          docker buildx imagetools create --prefer-index=false \
            -t ${{ env.DOCKERHUB_IMAGE_NAME }}:amd64-${VERSION} \
            -t ${{ env.DOCKERHUB_IMAGE_NAME }}:amd64-latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.amd64 }}
          docker buildx imagetools create --prefer-index=false \
            -t ${{ env.DOCKERHUB_IMAGE_NAME }}:arm64-${VERSION} \
            -t ${{ env.DOCKERHUB_IMAGE_NAME }}:arm64-latest \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.arm64 }}

      - name: Create manifest list and push (GHCR)
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.GHCR_REGISTRY }}")) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            --annotation "index:org.opencontainers.image.title=${{ github.event.repository.name }}" \
            --annotation "index:org.opencontainers.image.description=${{ github.event.repository.description }}" \
            --annotation "index:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "index:org.opencontainers.image.vendor=${{ github.repository_owner }}" \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.amd64 }} \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.arm64 }}

      - name: Create manifest list and push (Docker Hub)
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map(select(startswith("${{ env.GHCR_REGISTRY }}") | not) | "-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            --annotation "index:org.opencontainers.image.title=${{ github.event.repository.name }}" \
            --annotation "index:org.opencontainers.image.description=${{ github.event.repository.description }}" \
            --annotation "index:org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "index:org.opencontainers.image.vendor=${{ github.repository_owner }}" \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.amd64 }} \
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}@${{ steps.digests.outputs.arm64 }}

      - name: Inspect image and extract digest
        id: inspect
        run: |
          digest=$(docker buildx imagetools inspect ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest --format '{{printf "%s" .Manifest.Digest}}')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: $digest"

      - name: Attest GHCR image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          subject-digest: ${{ steps.inspect.outputs.digest }}
          push-to-registry: true