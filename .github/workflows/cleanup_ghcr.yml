name: Cleanup GHCR

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete orphaned images
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1
        with:
          delete-untagged: true
          delete-orphaned-images: true
          keep-n-tagged: 20
          token: ${{ secrets.GITHUB_TOKEN }}
