name: Cleanup GHCR

on:
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete orphaned images
        uses: dataaxiom/ghcr-cleanup-action@f092b48ba3b604b2a83690dc4b2bbb3392e1045f # v1
        with:
          delete-untagged: true
          delete-orphaned-images: true
          keep-n-tagged: 20
          token: ${{ secrets.GITHUB_TOKEN }}
