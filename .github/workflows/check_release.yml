name: Check Release

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily
  workflow_dispatch:

env:
  X86_64_MIRROR: "https://mirror.rackspace.com/archlinux/extra/os/x86_64/extra.db"
  AARCH64_MIRROR: "http://mirror.archlinuxarm.org/aarch64/extra/extra.db"

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for Latest Upstream Releases
        id: check-release
        run: |
          CHANGED=false

          echo "Fetching latest nicotine+ version from x86_64 Arch extra repo..."
          X86_64_VERSION=$(curl -sL "${{ env.X86_64_MIRROR }}" | tar tzf - | grep -m1 '^nicotine+' | sed 's|^nicotine+-||;s|/.*||')
          if [ -z "$X86_64_VERSION" ]; then
            echo "::error::Failed to extract nicotine+ version from x86_64 Arch mirror."
            exit 1
          fi

          echo "Fetching latest nicotine+ version from aarch64 Arch Linux ARM extra repo..."
          AARCH64_VERSION=$(curl -sL "${{ env.AARCH64_MIRROR }}" | tar tzf - | grep -m1 '^nicotine+' | sed 's|^nicotine+-||;s|/.*||')
          if [ -z "$AARCH64_VERSION" ]; then
            echo "::error::Failed to extract nicotine+ version from aarch64 Arch Linux ARM mirror."
            exit 1
          fi

          PREV_X86_64=$(cat .github/.current-release-x86_64 2>/dev/null || echo "")
          PREV_AARCH64=$(cat .github/.current-release-aarch64 2>/dev/null || echo "")

          echo "Previous x86_64 Release: $PREV_X86_64"
          echo "Current x86_64 Release: $X86_64_VERSION"
          echo "Previous aarch64 Release: $PREV_AARCH64"
          echo "Current aarch64 Release: $AARCH64_VERSION"

          if [ "$X86_64_VERSION" != "$PREV_X86_64" ]; then
            echo "New x86_64 release detected: $X86_64_VERSION"
            echo "$X86_64_VERSION" > .github/.current-release-x86_64
            CHANGED=true
          fi

          if [ "$AARCH64_VERSION" != "$PREV_AARCH64" ]; then
            echo "New aarch64 release detected: $AARCH64_VERSION"
            echo "$AARCH64_VERSION" > .github/.current-release-aarch64
            CHANGED=true
          fi

          if [ "$CHANGED" = true ]; then
            git add .github/.current-release-x86_64 .github/.current-release-aarch64

            if git diff --cached --quiet; then
              echo "No changes to commit."
            else
              git -c user.name="GitHub Actions" -c user.email="actions@github.com" \
                commit -m "update versions to x86_64=$X86_64_VERSION aarch64=$AARCH64_VERSION"
              git push origin main || { echo '::error::Push failed'; exit 1; }
            fi
          else
            echo "No new releases detected."
          fi