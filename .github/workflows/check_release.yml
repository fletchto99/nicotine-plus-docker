name: Check Release

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for Latest Upstream Release
        id: check-release
        run: |
          echo "Fetching latest Nicotine+ release from GitHub..."
          LATEST_VERSION=$(curl -sL "https://api.github.com/repos/nicotine-plus/nicotine-plus/releases/latest" \
            | jq -r '.tag_name')
          if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
            echo "::error::Failed to fetch latest Nicotine+ version from GitHub."
            exit 1
          fi

          PREV_VERSION=$(cat .github/.current-release 2>/dev/null || echo "")

          echo "Previous Release: $PREV_VERSION"
          echo "Current Release: $LATEST_VERSION"

          if [ "$LATEST_VERSION" != "$PREV_VERSION" ]; then
            echo "New release detected: $LATEST_VERSION"
            echo "$LATEST_VERSION" > .github/.current-release
            git add .github/.current-release

            if git diff --cached --quiet; then
              echo "No changes to commit."
            else
              git -c user.name="GitHub Actions" -c user.email="actions@github.com" \
                commit -m "update version to $LATEST_VERSION"
              git push origin main || { echo '::error::Push failed'; exit 1; }
            fi
          else
            echo "No new release detected."
          fi