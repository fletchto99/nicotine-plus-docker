name: Check Release

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily
  workflow_dispatch:

env:
  ARCH_MIRROR: "https://mirror.rackspace.com/archlinux/extra/os/x86_64/extra.db"

permissions:
  contents: write
  packages: write

jobs:
  check-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Latest Upstream Release
        id: check-release
        run: |
          echo "Fetching latest nicotine+ version from Arch extra repo..."

          RELEASE_TAG=$(curl -sL "${{ env.ARCH_MIRROR }}" | tar tzf - | grep -m1 '^nicotine+' | sed 's|^nicotine+-||;s|/.*||')
          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::Failed to extract nicotine+ version from Arch mirror."
            exit 1
          fi

          PREV_RELEASE=$(cat .github/.current-release 2>/dev/null || echo "")
          echo "Previous Release: $PREV_RELEASE"
          echo "Current Release: $RELEASE_TAG"

          if [ "$RELEASE_TAG" != "$PREV_RELEASE" ]; then
            echo "New release detected: $RELEASE_TAG"
            echo "$RELEASE_TAG" > .github/.current-release

            git add .github/.current-release

            if git diff --cached --quiet; then
              echo "No changes to commit."
            else
              git -c user.name="GitHub Actions" -c user.email="actions@github.com" commit -m "update version to $RELEASE_TAG"
              git push origin main || { echo '::error::Push failed'; exit 1; }
            fi
          else
            echo "No new release detected."
          fi